# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build -c Release --no-restore
      
    - name: Test
      run: dotnet run --project InputManager.Test/InputManager.Tests.csproj -c Release --no-build
      
  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get Project Version
        id: get_version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' InputManager/InputManager.csproj)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check version on NuGet
        id: check
        uses: MeilCli/nuget-update-check-action@v4
        with:
          package-id: 'Vaype.InputManager'
          version: ${{ steps.get_version.outputs.VERSION }}

      - name: Publish to nuget
        if: steps.check.outputs.is_update == 'true'
        run: |
          dotnet pack InputManager/InputManager.csproj -c Release -o out
          dotnet nuget push out/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
